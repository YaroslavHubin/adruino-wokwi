<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Прогноз врожайності</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>Система прогнозування врожайності</h1>

  <label for="cropSelect">Виберіть культуру:</label>
  <select id="cropSelect" onchange="loadData()">
    <option value="all">Всі культури</option>
    {% for crop in crops %}
      <option value="{{ crop }}">{{ crop }}</option>
    {% endfor %}
  </select>

  <canvas id="chart" width="800" height="400"></canvas>

  <h2>ML‑Передбачення</h2>
  <form id="predictForm">
    <input type="number" name="N" placeholder="N" required>
    <input type="number" name="P" placeholder="P" required>
    <input type="number" name="K" placeholder="K" required>
    <input type="number" name="temperature" placeholder="Temperature" required>
    <input type="number" name="humidity" placeholder="Humidity" required>
    <input type="number" name="ph" placeholder="pH" required>
    <input type="number" name="rainfall" placeholder="Rainfall" required>
    <button type="submit">Передбачити</button>
  </form>
  <p id="prediction"></p>

  <script>
    let chart;

    async function loadData() {
      const crop = document.getElementById("cropSelect").value;
      const res = await fetch(`/data?crop=${crop}`);
      const data = await res.json();

      const labels = data.map((d, i) => i);
      const temps = data.map(d => d.temperature);
      const hums = data.map(d => d.humidity);

      const ctx = document.getElementById("chart").getContext("2d");
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'Температура', data: temps, borderColor: 'red', fill: false },
            { label: 'Вологість', data: hums, borderColor: 'blue', fill: false }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'top' },
            title: { display: true, text: crop === "all" ? "Графік усіх культур" : `Графік для ${crop}` }
          }
        }
      });
    }

    document.getElementById("predictForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const values = Object.fromEntries(formData.entries());
      for (let key in values) values[key] = parseFloat(values[key]);

      const res = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(values)
      });
      const result = await res.json();
      document.getElementById("prediction").innerText =
        "Прогнозована культура: " + result.prediction_crop +
        " | Прогнозована врожайність: " + result.prediction_yield + " тонн/га";
    });

    // Завантажуємо графік при старті
    loadData();
  </script>
</body>
</html>
